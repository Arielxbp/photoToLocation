# GeoGuessr Agent Configuration

model:
  backbone: efficientnet_b3 # change to efficientnet_b1 for old model
  pretrained: true
  pretrained_weights: IMAGENET1K_V2
  image_size: [320, 180]
  embed_dim: 1536 #1280 for efficientnet_b1
  dropout: 0.3
  num_countries: 96
  num_regions: 24576
  num_continents: 7
  region_type: s2_l6

training:
  batch_size: 128
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.01
  lr_scheduler_patience: 5
  lr_scheduler_factor: 0.5
  scheduler_type: cosine
  warmup_epochs: 5
  label_smoothing: 0.05
  mixup_alpha: 0.2
  loss_country_weight: 0.6
  loss_region_weight: 0.3
  loss_continent_weight: 0.1
  haversine_temperature: 1.0
  num_workers: 4
  val_split: 0.1
  seed: 42
  mixed_precision: true
  use_tta: true

data:
  kaggle_dir: data/kaggle
  plonkit_cache_dir: data/plonkit_cache
  checkpoint_dir: checkpoints
  log_dir: logs
  use_mapped_subset: false
  min_images_per_country: 50
  filter_duplicate_coords: true
  filter_low_variance: true
  variance_threshold: 15.0
  laplacian_threshold: 50.0

device: cuda
